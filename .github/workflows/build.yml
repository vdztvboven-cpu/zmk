name: Build ZMK Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            modules/
            tools/
            zephyr/
            bootloader/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-

      - name: Initialize workspace (West)
        uses: zmkfirmware/zmk-actions-toolkit@v2
        with:
          init_script: 'west init -m https://github.com/zmkfirmware/zmk --mr v2.5'

      - name: Build Firmware
        uses: zmkfirmware/zmk-actions-toolkit@v2
        with:
          blueprint: 'nano'
          board: 'nice_nano_v2'
          shield: 'steno'
